<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
</head>
<body>
    <div class="navbar">
        <div class="logo-box">
       <a href="home.html"></a> <img class="logo" src="/assets/logo.jpg">
       </div>
        <span><a  class="headings" href="about.html">About me</a> </span>
        <span><a class="headings" href="sign-up.html">Sign up</a></span>
        <span><a class="headings" href="Profile.html">Profile</a></span>
        <span><a class="headings" href="feed.html">Feed</a></span>

    </div>
    <div class="logo-wrap">
    <div class="sign-inputs">
<form id="SignUpData" autocomplete="off">
    <div class="inputs">
        <label for="name">Full Name :</label>
        <input 
        type="text"
        id="name"
        name="fullName"
        placeholder="Full Name"
        required
        >
    </div>
    <div class="inputs">
        <label for="name">Student Number :</label>
        <input 
        type="text"
        id="studentNo"
        name="studentNo"
        placeholder="Student Number"
        required
        >
    </div>
    <div class="inputs">
        <label for="name">Campus :</label>
        <input 
        type="text"
        id="campus"
        name="campus"
        placeholder="Campus"
        required
        >
    </div>
       <div class="inputs">
        <label for="name">Email Address :</label>
        <input 
        type="email"
        id="email"
        name="email"
        placeholder="Email Address"
        required
        >
    </div>
       <div class="inputs">
        <label for="name">Password :</label>
        <input 
        type="password"
        id="password"
        name="password"
        placeholder="Password"
        required
        >
    </div>
     <label for="interests">Interests:</label><br>
  <input
   id="interests"
    type="text" 
    placeholder="Enter interests"><br><br>

  <label for="bio">Short Bio:</label><br>
  <textarea id="bio"
   placeholder="Enter bio"></textarea>

</form>
    </div>
    </div>
</body>
